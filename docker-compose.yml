services:
  nextjs-vllm-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: nextjs-vllm-ui:local
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-vllm}
      VLLM_URL: ${VLLM_URL:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      VLLM_MODEL: ${VLLM_MODEL:-}
      VLLM_TOKEN_LIMIT: ${VLLM_TOKEN_LIMIT:-}
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      OLLAMA_TOKEN_LIMIT: ${OLLAMA_TOKEN_LIMIT:-}
      OPENAI_URL: ${OPENAI_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TOKEN_LIMIT: ${OPENAI_TOKEN_LIMIT:-128000}
      CUSTOM_OPENAI_URL: ${CUSTOM_OPENAI_URL:-}
      CUSTOM_OPENAI_API_KEY: ${CUSTOM_OPENAI_API_KEY:-}
      CUSTOM_OPENAI_MODEL: ${CUSTOM_OPENAI_MODEL:-}
      CUSTOM_OPENAI_TOKEN_LIMIT: ${CUSTOM_OPENAI_TOKEN_LIMIT:-}
